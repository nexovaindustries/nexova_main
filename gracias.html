<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mensaje enviado - Nexova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: #f8faff; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .card { background: white; border-radius: 2rem; padding: 4rem 3rem; max-width: 520px; width: 100%; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.08); border: 1px solid #e8ecf4; }
    .icon { width: 80px; height: 80px; background: #f0fdf4; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; }
    .icon svg { width: 40px; height: 40px; color: #22c55e; }
    h1 { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: #112240; margin-bottom: 1rem; }
    p { color: #64748b; line-height: 1.7; margin-bottom: 2rem; }
    a { display: inline-block; background: #112240; color: white; padding: 1rem 2.5rem; border-radius: 100px; font-weight: 600; text-decoration: none; font-size: 0.9rem; transition: background 0.2s; }
    a:hover { background: #1A365D; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    </div>
    <h1>¡Mensaje enviado!</h1>
    <p>Gracias por contactarnos. Tu mensaje llegó correctamente a nuestro equipo. Te responderemos en menos de 24 horas.</p>
    <a href="/">← Volver al inicio</a>
  </div>
</body>
</html>
